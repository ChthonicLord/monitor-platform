name: Build & Deploy Monitor Platform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ============================================================
      #  构建 Dashboard（Vite + React SPA）
      # ============================================================
      - name: Build Dashboard
        run: |
          cd dashboard
          npm install
          npm run build

      # ============================================================
      #  构建 Server（TypeScript → CommonJS）
      # ============================================================
      - name: Build Server
        run: |
          cd server
          npm install
          npm run build

      # ============================================================
      #  打包（避免 SCP glob 问题）
      # ============================================================
      - name: Package artifacts
        run: |
          cd dashboard/dist && tar czf ../../dashboard-dist.tar.gz . && cd ../..
          cd server/dist    && tar czf ../../server-dist.tar.gz .    && cd ../..
          cp server/package.json server-package.json

      # ============================================================
      #  上传 Dashboard
      # ============================================================
      - name: Upload Dashboard
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: 'dashboard-dist.tar.gz'
          target: '/tmp/'
          strip_components: 0

      # ============================================================
      #  上传 Server
      # ============================================================
      - name: Upload Server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: 'server-dist.tar.gz,server-package.json'
          target: '/tmp/'
          strip_components: 0

      # ============================================================
      #  服务器端：解压 + 安装依赖 + 重启
      # ============================================================
      - name: Deploy & Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            set -e

            # ---- Dashboard ----
            mkdir -p /var/www/monitor-platform/dashboard
            tar xzf /tmp/dashboard-dist.tar.gz -C /var/www/monitor-platform/dashboard/
            rm /tmp/dashboard-dist.tar.gz
            echo "Dashboard deployed: $(ls /var/www/monitor-platform/dashboard/ | head -5)"

            # ---- Server ----
            mkdir -p /var/www/monitor-platform/server/dist
            tar xzf /tmp/server-dist.tar.gz -C /var/www/monitor-platform/server/dist/
            cp /tmp/server-package.json /var/www/monitor-platform/server/package.json
            rm /tmp/server-dist.tar.gz /tmp/server-package.json

            cd /var/www/monitor-platform/server
            npm install --production
            which pm2 || npm install -g pm2
            pm2 restart monitor-server || pm2 start dist/index.js --name monitor-server
            pm2 save
            echo "=== PM2 status ==="
            pm2 list
